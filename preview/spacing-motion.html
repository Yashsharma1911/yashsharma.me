<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Motion · three durations, one easing</div>
  <div style="display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center;">
    <div style="display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center;">
      <span class="mono" style="font-size: 12px;">120ms</span>
      <span style="font-size: 14px; color: var(--ink-soft);">Hover color, link underline shifts</span>
    </div>
    <div style="display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center;">
      <span class="mono" style="font-size: 12px;">240ms</span>
      <span style="font-size: 14px; color: var(--ink-soft);">Photo marquee filter, focus rings</span>
    </div>
    <div style="display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center;">
      <span class="mono" style="font-size: 12px;">480ms</span>
      <span style="font-size: 14px; color: var(--ink-soft);">First-reveal section fades</span>
    </div>
    <div style="height: 1px; background: var(--rule); margin: 6px 0;"></div>
    <div style="display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center;">
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">easing</span>
      <span class="mono" style="font-size: 12px; color: var(--ink);">cubic-bezier(0.2, 0, 0, 1)</span>
    </div>
    <div style="display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center;">
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">forbidden</span>
      <span style="font-size: 13px; color: var(--ink-soft); font-style: italic;">bounce, overshoot, parallax, scroll-jacking</span>
    </div>
  </div>
</div>
</body></html>
