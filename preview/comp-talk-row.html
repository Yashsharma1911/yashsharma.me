<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Compact talk-list row</div>
  <div style="display: flex; flex-direction: column; gap: 0; flex: 1;">
    <!-- Year heading -->
    <div style="display: grid; grid-template-columns: 80px 1fr; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--rule);">
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); letter-spacing: 0.12em;">2024</span>
      <span></span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 100px 80px; gap: 24px; padding: 12px 0; border-bottom: 1px solid var(--rule); align-items: baseline;">
      <span class="mono" style="font-size: 12px; color: var(--ink-soft);">mar</span>
      <span style="font-size: 16px; color: var(--ink);">Re-architecting observability for 20,000 clusters</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">kubecon eu</span>
      <span style="font-size: 13px; text-align: right;"><a href="#">slides</a> &middot; <a href="#">video</a></span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 100px 80px; gap: 24px; padding: 12px 0; border-bottom: 1px solid var(--rule); align-items: baseline; position: relative;">
      <span style="position: absolute; left: -8px; top: 12px; bottom: 12px; width: 2px; background: var(--accent);"></span>
      <span class="mono" style="font-size: 12px; color: var(--ink-soft);">jan</span>
      <span style="font-size: 16px; color: var(--ink);">The control plane is the product <span class="mono" style="font-size: 11px; color: var(--accent); margin-left: 6px;">&larr; hover</span></span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">containerdays</span>
      <span style="font-size: 13px; text-align: right;"><a href="#">slides</a></span>
    </div>
  </div>
</div>
</body></html>
