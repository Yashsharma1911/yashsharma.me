<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Spacing · 4px base</div>
  <div style="display: flex; flex-direction: column; gap: 6px; flex: 1; justify-content: center;">
    <!-- Each row: token name in mono, bar visualizing size, px value -->
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-1</span>
      <div style="height: 6px; background: var(--ink); width: 4px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">4</span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-2</span>
      <div style="height: 6px; background: var(--ink); width: 8px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">8</span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-4</span>
      <div style="height: 6px; background: var(--ink); width: 16px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">16</span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-8</span>
      <div style="height: 6px; background: var(--ink); width: 32px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">32</span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-16</span>
      <div style="height: 6px; background: var(--ink); width: 64px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">64</span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-32</span>
      <div style="height: 6px; background: var(--ink); width: 128px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">128</span>
    </div>
    <div style="display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 16px;">
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">space-48</span>
      <div style="height: 6px; background: var(--ink); width: 192px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint); text-align: right;">192</span>
    </div>
  </div>
</div>
</body></html>
