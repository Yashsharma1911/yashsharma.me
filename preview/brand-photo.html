<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Imagery · marquee filter at rest &amp; on hover</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1;">
    <div style="position: relative; border-radius: 4px; overflow: hidden; background: linear-gradient(135deg, #4a4540, #2a2520); min-height: 130px; filter: saturate(0.4) contrast(0.95);">
      <div style="position: absolute; inset: 0; display: flex; align-items: flex-end; padding: 12px;">
        <span class="mono" style="font-size: 10px; color: rgba(244,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase;">at rest</span>
      </div>
    </div>
    <div style="position: relative; border-radius: 4px; overflow: hidden; background: linear-gradient(135deg, #6a5d50, #3a322a); min-height: 130px;">
      <div style="position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; gap: 4px;">
        <span class="mono" style="font-size: 12px; color: #F4F1EA;">kubecon eu &middot; paris</span>
        <span class="mono" style="font-size: 10px; color: rgba(244,241,234,0.65); letter-spacing: 0.14em; text-transform: uppercase;">on hover &middot; mar 2024</span>
      </div>
    </div>
  </div>
</div>
</body></html>
