<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Surfaces · paper &amp; ink</div>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex: 1;">
    <div style="background: #F4F1EA; border: 1px solid var(--rule); border-radius: 4px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px;">
      <span class="mono" style="font-size: 11px; color: var(--ink);">--paper</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">#F4F1EA</span>
    </div>
    <div style="background: #EBE7DD; border: 1px solid var(--rule); border-radius: 4px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px;">
      <span class="mono" style="font-size: 11px; color: var(--ink);">--paper-deep</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-soft);">#EBE7DD</span>
    </div>
    <div style="background: #1A1714; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px;">
      <span class="mono" style="font-size: 11px; color: #F4F1EA;">--ink</span>
      <span class="mono" style="font-size: 11px; color: #9C958A;">#1A1714</span>
    </div>
    <div style="background: #0F0E0C; border-radius: 4px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px;">
      <span class="mono" style="font-size: 11px; color: #F4F1EA;">--ink-deep</span>
      <span class="mono" style="font-size: 11px; color: #9C958A;">#0F0E0C</span>
    </div>
  </div>
</div>
</body></html>
