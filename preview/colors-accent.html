<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <span class="eyebrow-tiny">Accent · oxblood</span>
    <span class="mono" style="font-size: 10px; color: var(--ink-faint);">&lt; 5% of pixels</span>
  </div>
  <div style="display: flex; gap: 12px; flex: 1;">
    <div style="flex: 2; background: #7A1C1C; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between;">
      <span class="mono" style="font-size: 11px; color: #F4F1EA;">--accent</span>
      <span class="mono" style="font-size: 11px; color: rgba(244,241,234,0.7);">#7A1C1C</span>
    </div>
    <div style="flex: 1; background: #5C1414; border-radius: 4px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between;">
      <span class="mono" style="font-size: 11px; color: #F4F1EA;">hover</span>
      <span class="mono" style="font-size: 11px; color: rgba(244,241,234,0.7);">#5C1414</span>
    </div>
    <div style="flex: 2; background: #F4F1EA; border: 1px solid var(--rule); border-radius: 4px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between;">
      <span style="font-size: 14px; color: var(--ink);">Read the essay <a href="#" style="color: #7A1C1C; text-decoration-color: #7A1C1C;">&rarr;</a></span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">in use &mdash; on hover only</span>
    </div>
  </div>
</div>
</body></html>
