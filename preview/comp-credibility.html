<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">

      <span class="numeral-xl" style="font-size: 80px; color: var(--accent);">20,000</span>

    <div style="border-left: 1px solid var(--rule); height: 80px; align-self: center;"></div>
    <div style="display: flex; flex-direction: column; gap: 6px;">
      <span class="numeral-xl" style="font-size: 80px; color: var(--accent);">460<span style="font-size: 36px; color: var(--ink-faint); margin-left: 4px;">TB</span></span>
      <span class="mono" style="font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint);">daily telemetry</span>
    </div>

    <div style="display: flex; flex-direction: column; gap: 6px;">
      <span style="font-family: var(--font-display); font-size: 32px; line-height: 1; color: var(--ink); font-style: italic;">CNCF</span>
      <span class="mono" style="font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint);">maintainer</span>
    </div>
  </div>
</div>
</body></html>
