<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Radii &amp; rules</div>
  <div style="display: flex; gap: 24px; align-items: center; flex: 1;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <div style="width: 64px; height: 64px; background: var(--ink); border-radius: 0;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">0 · sharp</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <div style="width: 64px; height: 64px; background: var(--ink); border-radius: 2px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">2 · sm</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <div style="width: 64px; height: 64px; background: var(--ink); border-radius: 4px;"></div>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">4 · md</span>
    </div>
    <div style="border-left: 1px solid var(--rule); height: 80px; margin: 0 8px;"></div>
    <div style="display: flex; flex-direction: column; gap: 14px; flex: 1;">
      <div>
        <div style="height: 1px; background: var(--rule);"></div>
        <span class="mono" style="font-size: 11px; color: var(--ink-faint); margin-top: 6px; display: inline-block;">1px hairline &middot; --rule</span>
      </div>
      <div>
        <div style="height: 1px; background: var(--ink-faint);"></div>
        <span class="mono" style="font-size: 11px; color: var(--ink-faint); margin-top: 6px; display: inline-block;">1px strong &middot; --ink-faint</span>
      </div>
      <div>
        <div style="height: 2px; background: var(--accent);"></div>
        <span class="mono" style="font-size: 11px; color: var(--ink-faint); margin-top: 6px; display: inline-block;">2px accent &middot; row hover</span>
      </div>
    </div>
  </div>
</div>
</body></html>
