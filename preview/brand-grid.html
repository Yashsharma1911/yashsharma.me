<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">
  <div class="eyebrow-tiny">Editorial grid · asymmetric, gutter-aware</div>
  <div style="display: grid; grid-template-columns: 1fr 2fr 2fr 1fr; gap: 8px; flex: 1; align-items: stretch;">
    <div style="border: 1px dashed var(--rule); border-radius: 2px; display: flex; align-items: center; justify-content: center;">
      <span class="mono" style="font-size: 9px; color: var(--ink-faint);">caption</span>
    </div>
    <div style="background: var(--paper-deep); border-radius: 2px; display: flex; align-items: center; padding: 12px;">
      <span style="font-family: var(--font-display); font-size: 18px; line-height: 1.1;">Section heading</span>
    </div>
    <div style="background: var(--ink); color: var(--paper); border-radius: 2px; display: flex; align-items: center; padding: 12px;">
      <span style="font-size: 13px; line-height: 1.5;">Long-form prose runs in the wider middle column, columns 4&ndash;11.</span>
    </div>
    <div style="border: 1px dashed var(--rule); border-radius: 2px; display: flex; align-items: center; justify-content: center;">
      <span class="mono" style="font-size: 9px; color: var(--ink-faint);">date</span>
    </div>
  </div>
  <span class="mono" style="font-size: 11px; color: var(--ink-faint);">12-col @ 1440 &middot; 8-col @ 1024 &middot; 4-col @ 768 &middot; 1-col @ 375</span>
</div>
</body></html>
