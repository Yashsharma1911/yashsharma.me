<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame">

    <div style="display: flex; align-items: center; gap: 16px;">
      <span style="display: inline-block; width: 28px; height: 28px; background: #1A1714; border-radius: 2px;"></span>
      <span style="font-size: 18px; color: #1A1714; flex: 1;">Primary &mdash; ink</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">#1A1714</span>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span style="display: inline-block; width: 28px; height: 28px; background: #5A544D; border-radius: 2px;"></span>
      <span style="font-size: 18px; color: #5A544D; flex: 1;">Secondary &mdash; ink-soft</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">#5A544D</span>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span style="display: inline-block; width: 28px; height: 28px; background: #9C958A; border-radius: 2px;"></span>
      <span style="font-size: 18px; color: #9C958A; flex: 1;">Tertiary &mdash; ink-faint</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">#9C958A</span>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span style="display: inline-block; width: 28px; height: 28px; background: #D8D2C5; border-radius: 2px;"></span>
      <span style="font-size: 18px; color: #9C958A; flex: 1;">Hairline &mdash; rule</span>
      <span class="mono" style="font-size: 11px; color: var(--ink-faint);">#D8D2C5</span>
    </div>
  </div>
</div>
</body></html>
