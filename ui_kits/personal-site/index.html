<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sahil Rao — Developer Advocate</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Instrument Serif', 'Tiempos Headline', 'Georgia', 'serif'],
            sans: ['Geist', 'Söhne', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'IBM Plex Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            paper: '#F4F1EA',
            'paper-deep': '#EBE7DD',
            ink: '#1A1714',
            'ink-soft': '#5A544D',
            'ink-faint': '#9C958A',
            rule: '#D8D2C5',
            accent: '#7A1C1C',
            'accent-hover': '#5C1414',
          },
          letterSpacing: { display: '-0.015em', tightest: '-0.04em' },
        },
      },
    };
  </script>
  <style>
    body { background: #F4F1EA; color: #1A1714; font-family: 'Geist', system-ui, sans-serif; }
    /* tailwind clobbers some defaults from colors_and_type.css; we re-state the marquee-specific bits */
    .marquee-track { animation: marquee 60s linear infinite; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-track:hover { animation-play-state: paused; }
    .marquee-tile { filter: saturate(0.4) contrast(0.95); transition: filter 240ms cubic-bezier(0.2,0,0,1); }
    .marquee-tile:hover { filter: saturate(1) contrast(1); }
    .marquee-tile .meta { opacity: 0; transition: opacity 240ms cubic-bezier(0.2,0,0,1); }
    .marquee-tile:hover .meta { opacity: 1; }
    .talk-row { position: relative; transition: background-color 120ms cubic-bezier(0.2,0,0,1); }
    .talk-row::before {
      content: ''; position: absolute; left: -8px; top: 12px; bottom: 12px; width: 2px;
      background: #7A1C1C; opacity: 0; transition: opacity 120ms cubic-bezier(0.2,0,0,1);
    }
    .talk-row:hover::before { opacity: 1; }
    .link-inline { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; text-decoration-color: #D8D2C5; transition: color 120ms, text-decoration-color 120ms; }
    .link-inline:hover { color: #7A1C1C; text-decoration-color: #7A1C1C; }
    /* Nav scroll-shadow rule */
    .nav-scrolled { border-bottom-color: #D8D2C5 !important; }
    /* Section entrance fade */
    .reveal { opacity: 0; transform: translateY(8px); transition: opacity 480ms cubic-bezier(0.2,0,0,1), transform 480ms cubic-bezier(0.2,0,0,1); }
    .reveal.in { opacity: 1; transform: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="LogoWall.jsx"></script>
  <script type="text/babel" src="Credibility.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="SignatureTalks.jsx"></script>
  <script type="text/babel" src="PullQuote.jsx"></script>
  <script type="text/babel" src="TalkList.jsx"></script>
  <script type="text/babel" src="PhotoMarquee.jsx"></script>
  <script type="text/babel" src="Content.jsx"></script>
  <script type="text/babel" src="OpenSource.jsx"></script>
  <script type="text/babel" src="Social.jsx"></script>
  <script type="text/babel" src="Press.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
